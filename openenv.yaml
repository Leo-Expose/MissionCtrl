spec_version: 1
name: missionctrl_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

env:
  - name: API_BASE_URL
    description: The API endpoint for the LLM (OpenAI-compatible)
    required: true
  - name: MODEL_NAME
    description: The model identifier to use for inference
    required: true
  - name: HF_TOKEN
    description: API key passed to the OpenAI client (hf_... for Hugging Face, gsk_... for Groq, etc.)
    required: true

tasks:
  - id: "easy"
    name: "Basic Oversight"
  - id: "medium"
    name: "Multi-Agent Triage"
  - id: "hard"
    name: "Adversarial Fleet Monitoring"
  - id: "special"
    name: "Hallucination Forensics"
